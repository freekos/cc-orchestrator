name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install TUI dep
        run: pip install textual
      - name: Configure git (worktrees need an identity)
        run: |
          git config --global user.email ci@cc.test
          git config --global user.name ci
      - name: Unit tests
        run: python test_cc.py
      - name: Engine integration (real git repos)
        run: python tests/test_engine_integration.py
      - name: TUI smoke (headless)
        run: python tests/test_tui_smoke.py
